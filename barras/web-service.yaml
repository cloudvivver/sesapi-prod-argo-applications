apiVersion: v1
kind: Service
metadata:
  name: barras-service
  namespace: barras
  labels:
    app: barras
    environment: production
spec:
  selector:
    app: barras
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
