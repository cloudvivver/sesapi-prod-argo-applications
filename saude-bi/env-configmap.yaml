apiVersion: v1
kind: ConfigMap
metadata:
  name: env
  namespace: saude-bi
  labels:
    app: saude-bi
data:
  # Kafka (próprio cluster no namespace saude-bi)
  KAFKA_BROKERS: "kafka-0.kafka-headless.saude-bi.svc.cluster.local:9092,kafka-1.kafka-headless.saude-bi.svc.cluster.local:9092,kafka-2.kafka-headless.saude-bi.svc.cluster.local:9092"
  KAFKA_TOPIC_ETAPAS: "atendimento.etapas"
  KAFKA_GROUP_ETAPAS: "saude-bi-etapas-consumers"
  # ClickHouse próprio do saude-bi
  CLICKHOUSE_HOST: "clickhouse.saude-bi.svc.cluster.local"
  CLICKHOUSE_PORT_HTTP: "8123"
  CLICKHOUSE_PORT_NATIVE: "9000"
  CLICKHOUSE_DATABASE: "bi_etapas"
  # ClickHouse — URL HTTP para o gateway (porta 8123)
  CLICKHOUSE_URL: "http://clickhouse.saude-bi.svc.cluster.local:8123"
  # Gateway de leitura — URL para os Rails legado (relatórios)
  SAUDE_BI_ETAPAS_API_URL: "http://saude-bi-gateway.saude-bi.svc.cluster.local:8080"
