# Secret para o gateway saude-bi validar assinatura HMAC das requisições.
# O valor deve ser o MESMO do AUDITORIA_GATEWAY_SECRET usado nos namespaces Rails
# (saude-homolog, campomaior, floriano, etc.) para que o Rails assine e o gateway valide.
#
# Criar o secret real (não versionar o valor):
#   kubectl create secret generic gateway-secret -n saude-bi --from-literal=gateway-secret="SEU_VALOR_AQUI"
# Ou aplicar a partir deste arquivo após substituir CHANGE_ME pelo valor real (e não commitar).
#
apiVersion: v1
kind: Secret
metadata:
  name: gateway-secret
  namespace: saude-bi
  labels:
    app: saude-bi-gateway
type: Opaque
stringData:
  gateway-secret: "CHANGE_ME"  # mesmo valor de AUDITORIA_GATEWAY_SECRET dos ambientes Rails
