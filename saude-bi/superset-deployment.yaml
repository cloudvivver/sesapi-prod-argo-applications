apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: saude-bi
  labels:
    app: superset
    component: bi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
        component: bi
    spec:
      containers:
        - name: superset
          image: apache/superset:3.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8088
          env:
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: secret-key
            - name: SUPERSET_LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: SUPERSET_LOAD_EXAMPLES
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: sqlalchemy-database-uri
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: superset-home
              mountPath: /app/superset_home
      volumes:
        - name: superset-home
          emptyDir: {}
      restartPolicy: Always
