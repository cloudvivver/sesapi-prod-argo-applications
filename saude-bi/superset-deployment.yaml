apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: saude-bi
  labels:
    app: superset
    component: bi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
        component: bi
    spec:
      containers:
        - name: superset
          image: 961341521437.dkr.ecr.sa-east-1.amazonaws.com/saude-bi-superset:3.0.0-clickhouse
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8088
          env:
            # Sobrescreve a variável injetada pelo Service (que vem como "tcp" e quebra o start).
            - name: SUPERSET_PORT
              value: "8088"
            - name: SUPERSET_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: secret-key
            - name: SUPERSET_LOAD_EXAMPLES
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: SUPERSET_LOAD_EXAMPLES
            - name: SQLALCHEMY_DATABASE_URI
              valueFrom:
                secretKeyRef:
                  name: superset-secret
                  key: sqlalchemy-database-uri
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: superset-home
              mountPath: /app/superset_home
      volumes:
        - name: superset-home
          emptyDir: {}
      restartPolicy: Always
