# Consumer de eventos de etapas do atendimento (Kafka/Redis → ClickHouse).
# Build/push: make publish em saude-bi/consumer.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: etapas-consumer
  namespace: saude-bi
  labels:
    app: etapas-consumer
    component: consumer
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etapas-consumer
  template:
    metadata:
      labels:
        app: etapas-consumer
        component: consumer
        tier: backend
    spec:
      containers:
        - name: consumer
          image: 961341521437.dkr.ecr.sa-east-1.amazonaws.com/saude-bi-consumer:latest
          imagePullPolicy: Always
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: KAFKA_BROKERS
            - name: KAFKA_TOPIC
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: KAFKA_TOPIC_ETAPAS
            - name: KAFKA_GROUP
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: KAFKA_GROUP_ETAPAS
            - name: CLICKHOUSE_HOST
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: CLICKHOUSE_HOST
            - name: CLICKHOUSE_PORT
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: CLICKHOUSE_PORT_NATIVE
            - name: CLICKHOUSE_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: env
                  key: CLICKHOUSE_DATABASE
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "exit 0"
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "exit 0"
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always
