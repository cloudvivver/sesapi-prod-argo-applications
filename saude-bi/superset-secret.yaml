# Não versionar com valores reais; usar Sealed Secrets em produção.
apiVersion: v1
kind: Secret
metadata:
  name: superset-secret
  namespace: saude-bi
  labels:
    app: superset
type: Opaque
stringData:
  secret-key: "CHANGE_ME_SUPERSET_SECRET_KEY"
  sqlalchemy-database-uri: "postgresql+psycopg2://readmodel:CHANGE_ME@postgres-readmodel.saude-bi.svc.cluster.local:5432/readmodel"
