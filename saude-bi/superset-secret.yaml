# SUPERSET_SECRET_KEY: openssl rand -base64 42
# SQLALCHEMY_DATABASE_URI: metadados do Superset (usuários, dashboards). SQLite local, sem RDS.
# Os dados analíticos ficam no ClickHouse; adicionar ClickHouse como Database no Superset UI.
# Não versionar secret-key real; usar Sealed Secrets em produção.
apiVersion: v1
kind: Secret
metadata:
  name: superset-secret
  namespace: saude-bi
  labels:
    app: superset
type: Opaque
stringData:
  secret-key: "CHANGE_ME_SUPERSET_SECRET_KEY"
  sqlalchemy-database-uri: "sqlite:////app/superset_home/superset.db"
