apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: azurefile-pvc
  namespace: floriano-tst
  labels:
    app: floriano-tst
spec:
  accessModes:
    - ReadWriteMany  # EFS suporta RWX para múltiplos pods
  storageClassName: efs-prod-viver  # EFS compartilhado
  resources:
    requests:
      storage: 100Gi
