apiVersion: v1
kind: Service
metadata:
  name: floriano-tst-service
  namespace: floriano-tst
spec:
  selector:
    app: floriano-tst
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 80
  type: ClusterIP
