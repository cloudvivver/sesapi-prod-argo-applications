apiVersion: v1
kind: Service
metadata:
  name: saoraimundo-service
  namespace: saoraimundo
spec:
  selector:
    app: saoraimundo
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
    - name: https
      protocol: TCP
      port: 443
      targetPort: 80
  type: ClusterIP



