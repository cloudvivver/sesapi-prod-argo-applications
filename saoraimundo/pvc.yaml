apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: azurefile-pvc
  namespace: saoraimundo
  labels:
    app: saoraimundo
spec:
  accessModes:
    - ReadWriteMany  # EFS suporta RWX para múltiplos pods
  storageClassName: efs-prod-viver  # EFS compartilhado
  resources:
    requests:
      storage: 100Gi
