apiVersion: batch/v1
kind: CronJob
metadata:
  name: research-results-job
spec:
  schedule: "*/30 * * * *"  # a cada 30 minutos
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  suspend: true  # reativar após estabilização do CNI
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300  # mata o job se travar por mais de 5 min
      template:
        spec:
          containers:
            - name: curl
              image: curlimages/curl:latest
              args:
                - -s
                - http://connect-service.cuidar-connect.svc.cluster.local/v0/api/tasks/research-results
          restartPolicy: OnFailure
