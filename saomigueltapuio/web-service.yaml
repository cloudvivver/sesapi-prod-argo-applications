apiVersion: v1
kind: Service
metadata:
  name: saomigueltapuio-service
  namespace: saomigueltapuio
  labels:
    app: saomigueltapuio
    environment: production
spec:
  selector:
    app: saomigueltapuio
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
